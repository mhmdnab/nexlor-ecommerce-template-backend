# Render Blueprint — provisions the API web service + a managed Postgres DB.
# Create via Render Dashboard → "New +" → "Blueprint" and point it at this repo.
# Docs: https://render.com/docs/blueprint-spec
#
# After the first deploy, set CORS_ORIGINS to your real Vercel URLs (see below),
# then seed the database once (see DEPLOY.md).

databases:
  - name: nexlor-db
    databaseName: nexlor_commerce
    user: nexlor
    plan: free # 90-day free Postgres; upgrade before it expires for production

services:
  - type: web
    name: nexlor-api
    runtime: node
    plan: free
    region: frankfurt # pick the region closest to you / your DB
    # Install (incl. devDependencies), generate the Prisma client, compile to dist/.
    # --include=dev is required: NODE_ENV=production (set below) otherwise makes
    # `npm ci` skip devDependencies, but the build needs nest-cli/prisma/typescript,
    # and the start command needs the `prisma` CLI for `migrate deploy`.
    buildCommand: npm ci --include=dev && npx prisma generate && npm run build
    # Apply pending migrations, then boot. Runs on every deploy/cold start;
    # `migrate deploy` is a no-op when the DB is already up to date.
    startCommand: npm run start:render
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      # DATABASE_URL is wired automatically from the managed database above.
      - key: DATABASE_URL
        fromDatabase:
          name: nexlor-db
          property: connectionString
      - key: NODE_ENV
        value: production
      # Render injects PORT; the app reads it. Listed for clarity.
      - key: PORT
        value: 10000
      # Auth secrets — generated once and kept stable across deploys.
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_TTL
        value: 900
      - key: JWT_REFRESH_TTL
        value: 2592000
      # Cross-site cookies: frontend (Vercel) and API (Render) are on different
      # domains, so the cookie must be host-only + SameSite=None + Secure.
      - key: COOKIE_DOMAIN
        value: "" # empty => host-only cookie on the API's onrender.com domain
      - key: COOKIE_SECURE
        value: "true"
      - key: COOKIE_SAMESITE
        value: none
      # IMPORTANT: set after your frontends are deployed. Comma-separated, no
      # trailing slash. Example:
      #   https://nexlor-storefront.vercel.app,https://nexlor-admin.vercel.app
      - key: CORS_ORIGINS
        sync: false
      # Optional — product image uploads via Cloudflare R2 (S3-compatible).
      # Leave unset to disable uploads (presign endpoint returns 503).
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        sync: false
      - key: R2_PUBLIC_BASE_URL
        sync: false
      - key: R2_ENDPOINT
        sync: false
